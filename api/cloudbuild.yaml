steps:
  # Instalar dependencias
  - name: "node:18"
    entrypoint: npm
    args: ["install"]

  # Construir la aplicación
  - name: "node:18"
    entrypoint: npm
    args: ["run", "build"]
    env:
      - "PORT=8080"
      - "SICAS_URL=${_SICAS_URL}"
      - "SICAS_USER=${_SICAS_USER}"
      - "SICAS_PASS=${_SICAS_PASS}"

  # Construir la imagen de Docker
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/ibsapp-api", "."]

  # Publicar la imagen
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/ibsapp-api"]

  # Desplegar en Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "ibsapp-api"
      - "--image"
      - "gcr.io/$PROJECT_ID/ibsapp-api"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "SICAS_URL=${_SICAS_URL},SICAS_USER=${_SICAS_USER},SICAS_PASS=${_SICAS_PASS}"

images:
  - "gcr.io/$PROJECT_ID/ibsapp-api"
